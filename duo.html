<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Check for a Duo Push</title>
  <meta name="description" content="Accessible Duo authentication mockup page." />
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --border: #d7dee8;
      --text: #1f2937;
      --muted: #4b5563;
      --link: #0047b2;
      --link-hover: #00337f;
      --focus: #1d4ed8;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
      --accent: #0061a8;
    }

    .page--duo {
      place-items: center;
    }

    .panel--duo {
      width: 100%;
      max-width: 32rem;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .device-graphic {
      width: 4.5rem;
      height: 4.5rem;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 1rem;
      background: #eff6ff;
      border: 1px solid #dbeafe;
    }

    .spinner-wrap {
      display: flex;
      justify-content: center;
    }

    .spinner {
      width: 1.5rem;
      height: 1.5rem;
      border: 3px solid #cbd5e1;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      margin: 0 0 0.85rem;
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.2;
    }

    p {
      margin: 0 0 1rem;
      line-height: 1.5;
    }

    .muted {
      color: var(--muted);
    }

    .target {
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .footer-note {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-weight: 700;
      text-align: center;
    }

    .icon-wrap {
      width: 3rem;
      height: 3rem;
      flex: 0 0 auto;
      color: var(--accent);
    }

    .icon-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .content {
      flex: 1 1 auto;
    }

    @media (max-width: 30rem) {
      .panel {
        padding: 1rem;
        border-radius: 0.85rem;
      }

      .top-row {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <main id="main-content" class="page page--duo">
    <section class="panel panel--duo" aria-labelledby="duo-title">
      <div class="top-row">
        <div class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" focusable="false">
            <rect x="16" y="8" width="32" height="48" rx="6" fill="currentColor" opacity="0.16"></rect>
            <rect x="20" y="12" width="24" height="34" rx="3" fill="currentColor"></rect>
            <circle cx="32" cy="50" r="2.5" fill="currentColor"></circle>
          </svg>
        </div>

        <div class="content">
          <h1 id="duo-title">Check for a Duo Push</h1>
          <p class="muted">Verify it is you by approving the notification on your device.</p>
          <p>Sent to <span class="target">Ant's iPhone 16 Pro Max (***-***-9221)</span></p>
        </div>
      </div>

      <div class="spinner-wrap">
        <div class="spinner" aria-hidden="true"></div>
      </div>

      <div class="actions">
        <a href="#">Other options</a>
        <a href="#">Need help?</a>
      </div>

      <div class="footer-note">Secured by Duo</div>
    </section>
  </main>

  <!-- Demo Navigation -->
  <nav class="demo-nav" aria-label="Demo pages">
    <details>
      <summary>Demo</summary>
      <ul>
        <li><a href="index.html">Default</a></li>
        <li><a href="duo.html">Duo</a></li>
        <li><a href="error.html">Error</a></li>
        <li><a href="invalid.html">Invalid</a></li>
        <li><a href="message.html">Message</a></li>
      </ul>
    </details>
  </nav>
  <!-- End Demo Navigation -->
</body>
</html>
